<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumCrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Remove default number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { 
            -moz-appearance: textfield; 
        }

        /* --- ANIMATIONS --- */
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(var(--spin)); opacity: 0; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
        }

        /* --- LAYOUT & COMPONENTS --- */
        #grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #confetti-container {
            position: fixed;
            inset: 0;
            z-index: 999;
            pointer-events: none;
        }

        .confetti-piece {
            position: absolute;
            top: -20px;
            animation: fall 3s ease-in forwards;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(10,10,20,0.92);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 560px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 60px rgba(0,255,136,0.08), 0 0 0 1px rgba(0,255,136,0.05);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo {
            font-size: 40px;
            margin-bottom: 6px;
        }
        
        .title {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.12em;
            text-shadow: 0 0 30px rgba(0,255,136,0.5);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 0.08em;
        }

        .streak-badge {
            display: none; /* Hidden by default */
            margin-top: 10px;
            background: rgba(255,77,0,0.15);
            border: 1px solid rgba(255,77,0,0.4);
            color: #ff4d00;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        .section {
            animation: fadeIn 0.3s ease;
            display: none; /* Sections are hidden by default, JS toggles them */
        }
        
        .section.active {
            display: block;
        }

        /* Menu Phase */
        .label {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .diff-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .diff-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 14px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .diff-btn:hover {
            background: rgba(255,255,255,0.06);
        }
        
        .diff-btn.active {
            background: rgba(0,255,136,0.08);
            border: 1px solid rgba(0,255,136,0.5);
            color: #fff;
            box-shadow: 0 0 20px rgba(0,255,136,0.12);
        }
        
        .diff-emoji { font-size: 22px; }
        .diff-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
        .diff-info { font-size: 11px; color: rgba(255,255,255,0.4); }

        .start-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: pulse 2s infinite;
        }

        .start-btn:hover {
            transform: scale(1.02);
        }

        /* Playing Phase */
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .meta-chip {
            font-size: 11px;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            color: rgba(255,255,255,0.6);
        }

        #meta-guesses-left { color: #00ff88; }
        
        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 100px;
            transition: all 0.4s ease;
            width: 0%;
            background: #00ff88;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row.shake { animation: shake 0.4s ease; }
        
        #guess-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        #guess-input:focus {
            border-color: rgba(0,255,136,0.5);
        }
        
        .guess-btn {
            padding: 12px 20px;
            background: rgba(0,255,136,0.12);
            border: 1px solid rgba(0,255,136,0.4);
            border-radius: 10px;
            color: #00ff88;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.15s;
        }

        .guess-btn:hover {
            background: rgba(0,255,136,0.2);
        }

        .history {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 5px; /* space for scrollbar */
        }
        
        /* Custom scrollbar for history */
        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .history-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            animation: fadeIn 0.2s ease;
        }
        
        .hist-num { color: rgba(255,255,255,0.2); font-size: 10px; min-width: 20px; }
        .hist-guess { color: #fff; font-weight: 700; font-size: 16px; min-width: 40px; }
        .hist-hint { font-size: 12px; letter-spacing: 0.04em; flex: 1; }

        /* End Screen (Won/Lost) */
        .end-screen {
            text-align: center;
        }

        .big-emoji { font-size: 64px; margin-bottom: 12px; }
        .end-title {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }
        
        .end-sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 8px; }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        
        .menu-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Background Grid -->
    <div id="grid"></div>

    <!-- Confetti Container -->
    <div id="confetti-container"></div>

    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="logo">🎲</div>
            <h1 class="title">NUMCRACK</h1>
            <p class="subtitle">Can you crack the number?</p>
            <div id="streak-badge" class="streak-badge">🔥 <span id="streak-count">0</span> WIN STREAK</div>
        </div>

        <!-- MENU PHASE -->
        <div id="phase-menu" class="section active">
            <p class="label">SELECT DIFFICULTY</p>
            <div class="diff-grid" id="diff-grid">
                <!-- Difficulty buttons injected via JS -->
            </div>
            <button class="start-btn" onclick="startGame()">START GAME →</button>
        </div>

        <!-- PLAYING PHASE -->
        <div id="phase-playing" class="section">
            <div class="meta">
                <span class="meta-chip" id="meta-diff">🟡 Medium</span>
                <span class="meta-chip" id="meta-range">Range: 1–100</span>
                <span class="meta-chip" id="meta-guesses-left">7 guesses left</span>
            </div>

            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>

            <div class="input-row" id="input-container">
                <input 
                    type="number" 
                    id="guess-input" 
                    placeholder="1 - 100" 
                    autofocus
                >
                <button class="guess-btn" onclick="submitGuess()">GUESS</button>
            </div>

            <div class="history" id="history-container">
                <!-- History rows injected via JS -->
            </div>
        </div>

        <!-- END PHASE (Won/Lost) -->
        <div id="phase-end" class="section end-screen">
            <div class="big-emoji" id="end-emoji">🏆</div>
            <h2 class="end-title" id="end-title">YOU CRACKED IT!</h2>
            
            <p class="end-sub">The number was <strong style="color: #ffcc00;" id="end-target">0</strong></p>
            <p class="end-sub" id="end-stats-1">Cracked in <strong style="color: #00ff88;">0</strong> guesses</p>
            <p class="end-sub" id="end-stats-2">Streak: <strong style="color: #ff4d00;">🔥 0</strong></p>
            
            <div class="btn-row">
                <button class="start-btn" id="replay-btn" onclick="startGame()">PLAY AGAIN →</button>
                <button class="menu-btn" onclick="goToMenu()">MENU</button>
            </div>
        </div>
    </div>

    <script>
        // --- GAME CONFIGURATION ---
        const DIFFICULTIES = {
            Easy:   { min: 1, max: 50,  maxGuesses: 10, emoji: "🟢" },
            Medium: { min: 1, max: 100, maxGuesses: 7,  emoji: "🟡" },
            Hard:   { min: 1, max: 200, maxGuesses: 6,  emoji: "🔴" },
            Insane: { min: 1, max: 500, maxGuesses: 5,  emoji: "💀" },
        };

        // --- STATE VARIABLES ---
        let currentDifficulty = "Medium";
        let targetNumber = null;
        let guesses = []; // Array of objects: { num, hint: { text, color } }
        let currentPhase = "menu"; // 'menu', 'playing', 'won', 'lost'
        let winStreak = 0;

        // --- DOM ELEMENTS ---
        const ui = {
            streakBadge: document.getElementById('streak-badge'),
            streakCount: document.getElementById('streak-count'),
            diffGrid: document.getElementById('diff-grid'),
            
            // Phases
            phaseMenu: document.getElementById('phase-menu'),
            phasePlaying: document.getElementById('phase-playing'),
            phaseEnd: document.getElementById('phase-end'),
            
            // Playing elements
            metaDiff: document.getElementById('meta-diff'),
            metaRange: document.getElementById('meta-range'),
            metaGuessesLeft: document.getElementById('meta-guesses-left'),
            progressBar: document.getElementById('progress-bar'),
            inputContainer: document.getElementById('input-container'),
            guessInput: document.getElementById('guess-input'),
            historyContainer: document.getElementById('history-container'),
            
            // End elements
            endEmoji: document.getElementById('end-emoji'),
            endTitle: document.getElementById('end-title'),
            endTarget: document.getElementById('end-target'),
            endStats1: document.getElementById('end-stats-1'),
            endStats2: document.getElementById('end-stats-2'),
            replayBtn: document.getElementById('replay-btn'),
            
            // Misc
            confettiContainer: document.getElementById('confetti-container')
        };

        // --- UTILITY FUNCTIONS ---
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getHint(guess, target, min, max) {
            const diff = Math.abs(guess - target);
            const range = max - min;
            const pct = diff / range;
            
            if (guess === target) return { text: "🎯 EXACT MATCH!", color: "#00ff88" };
            
            const dir = guess < target ? "📈 Go HIGHER" : "📉 Go LOWER";
            
            if (pct < 0.05) return { text: `${dir} — You're SCORCHING HOT 🔥`, color: "#ff4d00" };
            if (pct < 0.12) return { text: `${dir} — Very warm ♨️`, color: "#ff8800" };
            if (pct < 0.25) return { text: `${dir} — Getting warm 🌡️`, color: "#ffcc00" };
            if (pct < 0.45) return { text: `${dir} — Lukewarm 🌊`, color: "#44ccff" };
            
            return { text: `${dir} — Ice cold 🧊`, color: "#88aaff" };
        }

        // --- INITIALIZATION ---
        function init() {
            renderDifficultyOptions();
            
            // Allow Enter key to submit guess
            ui.guessInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    submitGuess();
                }
            });
        }

        // --- UI UPDATES ---
        function setPhase(phaseName) {
            currentPhase = phaseName;
            
            // Hide all phases
            ui.phaseMenu.classList.remove('active');
            ui.phasePlaying.classList.remove('active');
            ui.phaseEnd.classList.remove('active');

            // Show current phase
            if (phaseName === 'menu') ui.phaseMenu.classList.add('active');
            else if (phaseName === 'playing') {
                ui.phasePlaying.classList.add('active');
                ui.guessInput.focus();
            }
            else if (phaseName === 'won' || phaseName === 'lost') {
                ui.phaseEnd.classList.add('active');
            }
            
            updateStreakUI();
        }

        function updateStreakUI() {
            if (winStreak > 0) {
                ui.streakBadge.style.display = "inline-block";
                ui.streakCount.innerText = winStreak;
            } else {
                ui.streakBadge.style.display = "none";
            }
        }

        function renderDifficultyOptions() {
            ui.diffGrid.innerHTML = '';
            
            for (const [name, data] of Object.entries(DIFFICULTIES)) {
                const btn = document.createElement('button');
                btn.className = `diff-btn ${currentDifficulty === name ? 'active' : ''}`;
                btn.onclick = () => {
                    currentDifficulty = name;
                    renderDifficultyOptions(); // Re-render to update active class
                };
                
                btn.innerHTML = `
                    <span class="diff-emoji">${data.emoji}</span>
                    <span class="diff-name">${name}</span>
                    <span class="diff-info">${data.min}–${data.max}</span>
                    <span class="diff-info">${data.maxGuesses} guesses</span>
                `;
                ui.diffGrid.appendChild(btn);
            }
        }

        function updatePlayingUI() {
            const cfg = DIFFICULTIES[currentDifficulty];
            const guessesLeft = cfg.maxGuesses - guesses.length;
            const progressPct = (guesses.length / cfg.maxGuesses) * 100;
            
            // Update Meta info
            ui.metaDiff.innerText = `${cfg.emoji} ${currentDifficulty}`;
            ui.metaRange.innerText = `Range: ${cfg.min}–${cfg.max}`;
            ui.metaGuessesLeft.innerText = `${guessesLeft} guess${guessesLeft !== 1 ? 'es' : ''} left`;
            ui.metaGuessesLeft.style.color = guessesLeft <= 2 ? "#ff4d00" : "#00ff88";
            
            ui.guessInput.placeholder = `${cfg.min} - ${cfg.max}`;
            ui.guessInput.min = cfg.min;
            ui.guessInput.max = cfg.max;

            // Update Progress Bar
            ui.progressBar.style.width = `${progressPct}%`;
            if (progressPct > 70) ui.progressBar.style.background = "#ff4d00";
            else if (progressPct > 40) ui.progressBar.style.background = "#ffcc00";
            else ui.progressBar.style.backgrou
